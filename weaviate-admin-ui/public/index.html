<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1976d2" />
    <meta
      name="description"
      content="Weaviate Admin Dashboard"
    />
    <title>Weaviate Admin</title>
    <script>
      // Suppress benign ResizeObserver loop errors from Monaco Editor / React Flow / Recharts.
      // These libraries trigger ResizeObserver callbacks that cause layout changes in the same
      // frame — the browser reports it but continues normally. CRA's dev overlay treats every
      // error event as fatal, so we intercept it in CAPTURE phase (which runs before CRA's
      // BUBBLE-phase listener) and stop it from propagating any further.
      window.addEventListener('error', function(e) {
        if (
          e.message === 'ResizeObserver loop completed with undelivered notifications.' ||
          e.message === 'ResizeObserver loop limit exceeded'
        ) {
          e.stopImmediatePropagation();
        }
      }, true /* capture phase */);
    </script>
    <style>
      body {
        margin: 0;
        font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
